name: CI etl-ventas
on:
  push: { branches: [ main ] }
  pull_request: { branches: [ main ] }
  workflow_dispatch:
permissions: { contents: read }
 
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install ruff==0.8.4
      - run: ruff check src tests
  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - run: pip install -r requirements-dev.txt
      - run: pytest --cov=src --cov-report=term-missing \
               --cov-fail-under=90 --junitxml=reports/junit.xml
  datos:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - run: pip install -r requirements-dev.txt
      - name: Ejecutar ETL
        env: { PYTHONPATH: . }
        run: |
          mkdir -p output
          python run_pipeline.py --input data/ventas.csv \
            --output output/ventas_limpias.csv
      - name: Validar dataset
        run: |
          python -c "import pandas as pd; d=pd.read_csv('output/ventas_limpias.csv'); \
          assert (d['monto']>0).all(), 'montos invalidos'; assert len(d)==3, 'filas != 3'"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ventas-limpias
          path: |
            output/**
            reports/**

